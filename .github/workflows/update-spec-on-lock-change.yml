name: Update Spec File on uv.lock Change

on:
  push:
    branches:
      - main
    paths:
      - 'uv.lock'

jobs:
  update-spec-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          # Reads the python version from your .python-version file
          python-version-file: '.python-version'
      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Run pydeps.py to update spec file
        run: uv run python release/pydeps.py release/packages/mlm/python-mcp-server-mlm/python-mcp-server-mlm.spec

      - name: Create Pull Request with updated spec file
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          # The token is automatically provided by GitHub
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update spec file from uv.lock"
          title: "chore(deps): Update python-mcp-server-mlm.spec from uv.lock"
          body: |
            `uv.lock` was updated in the last push to `main`.

            This PR was automatically created to update the `python-mcp-server-mlm.spec` file with the new dependencies.
          branch: "chore/auto-update-spec-file"
          delete-branch: true
          labels: "dependencies, automation"
          reviewers: ${{ !endsWith(github.actor, '[bot]') && github.actor || '' }}
          sign-commits: true
