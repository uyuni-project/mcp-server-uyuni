name: Update Spec File on uv.lock Change

on:
  push:
    branches:
      - main
    paths:
      - 'uv.lock'

jobs:
  update-spec-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository # v6.0.2
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          # Reads the python version from your .python-version file
          python-version-file: '.python-version'
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Run pydeps.py to update spec file
        run: uv run python release/pydeps.py release/packages/mlm/python-mcp-server-mlm/python-mcp-server-mlm.spec

      - name: Create Pull Request with updated spec file
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        id: cpr
        with:
          # The token is automatically provided by GitHub
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update spec file from uv.lock"
          title: "chore(deps): Update python-mcp-server-mlm.spec from uv.lock"
          body: |
            `uv.lock` was updated in the last push to `main`.

            This PR was automatically created to update the `python-mcp-server-mlm.spec` file with the new dependencies.
          branch: "chore/auto-update-spec-file"
          delete-branch: true
          labels: "dependencies, automation"
          reviewers: ${{ !endsWith(github.actor, '[bot]') && github.actor || '' }}
          sign-commits: true

      - name: Create issue for dependency review
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/create-issue@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "review packages dependencies"
          body: |
            Python dependencies have changed in `uv.lock`.

            Please review the auto-generated PR: ${{ steps.cpr.outputs.pull-request-url }}

            Also, review the RPM dependencies in the build service: https://build.opensuse.org/project/show/systemsmanagement:Uyuni:AI

            ### Definition of Done
            - [ ] Dependencies updated in GitHub (PR merged)
            - [ ] Dependencies updated in build.opensuse.org
          labels: "dependencies, automation"
