name: Bandit Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  security-events: write
  contents: read

jobs:
  bandit:
    name: Bandit Python SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Run Bandit
        run: uv run --with 'bandit[sarif]' bandit -r src/ -f screen

      - name: Generate SARIF report
        if: always() && github.event_name != 'pull_request'
        run: uv run --with 'bandit[sarif]' bandit -r src/ -f sarif -o bandit-results.sarif || true

      - name: Upload Bandit results to GitHub Security tab
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@603b797f8b14b413fe025cd935a91c16c4782713 # v3
        with:
          sarif_file: "bandit-results.sarif"
