load_module modules/ngx_http_js_module.so;

events {
    worker_connections 1024;
}

http {
    js_path /etc/nginx/njs;
    js_import dcrSanitize from dcr_sanitize.js;

    upstream keycloak_upstream {
        server keycloak:8080;
    }

    server {
        listen 8080;
        server_name _;
        client_max_body_size 2m;

        location = /_keycloak_dcr_upstream {
            internal;
            proxy_pass http://keycloak_upstream/realms/uyuni-mcp/clients-registrations/openid-connect$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        location = /realms/uyuni-mcp/clients-registrations/openid-connect {
            js_content dcrSanitize.proxyDcrRegistration;
        }

        location / {
            proxy_pass http://keycloak_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
        }
    }
}
